<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Looney Tunes Quiz</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<style id="ds-games-header-style">
  .ds-games-topbar { height: 10px; background: linear-gradient(90deg, #7c3aed 0 32%, #a855f7 32% 52%, #f97316 52% 64%, #ef4444 64% 76%, #6d28d9 76% 88%, #22c55e 88% 96%, #facc15 96% 100%); }
  .ds-games-header { display: flex; align-items: center; justify-content: space-between; gap: 18px; padding: 10px 22px; background: #ffffff; color: #111827; font-family: Arial, Helvetica, sans-serif; border-bottom: 2px solid #eef2ff; box-sizing: border-box; }
  .ds-games-title { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .ds-games-eyebrow { margin: 0; color: #a855f7; font-size: .72rem; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; }
  .ds-games-eyebrow a { color: inherit; text-decoration: none; }
  .ds-games-h1 { margin: 0; color: #7c3aed; font-size: 1.4rem; font-weight: 800; line-height: 1; }
  .ds-games-home { display: inline-flex; align-items: center; justify-content: center; min-height: 36px; padding: 0 14px; color: #ffffff; background: #7c3aed; border-radius: 8px; font: 700 .9rem Arial, sans-serif; text-decoration: none; white-space: nowrap; }
  .ds-games-home:hover { background: #6d28d9; }
</style>
<div class="ds-games-topbar"></div>
<header class="ds-games-header">
  <div class="ds-games-title">
    <p class="ds-games-eyebrow"><a href="../../pages/features.html">DrawSplat&trade; Games</a></p>
    <h1 class="ds-games-h1">Looney Tunes Quiz</h1>
  </div>
  <a class="ds-games-home" href="../../index.html">Home</a>
</header>



<div id="quiz-container">
    <h1>Looney Tunes Educator Quiz</h1>
    <select onchange="location = this.value;">
      <option disabled selected>Choose a quiz</option>
      <option value='index.html'>Winnie the Pooh</option>
      <option value='smurfs.html'>The Smurfs</option>
      <option value='dwarfs.html'>Snow White</option>
      <option value='looney.html'>Looney Tunes</option>
    </select>
    <div id="question-box"></div>
    <button id="next-btn" onclick="nextQuestion()">Next</button>
    <div id="result-box"></div>
  </div>
  <script src="script.js"></script>
  <script src="data/looney-questions.js"></script>
</body>
</html>
