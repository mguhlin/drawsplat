<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="doc.title">Untangle — DrawSplat Games</title>
<script src="../../assets/js/widget-i18n.js"></script>
<style>
  .i18n-picker select { padding: 6px 10px; border: 2px solid #cbd5e1; border-radius: 8px; background: #fff; color: #111827; font-weight: 700; font-size: .82rem; cursor: pointer; min-height: 36px; }
  .i18n-picker select:focus { border-color: #7c3aed; outline: none; box-shadow: 0 0 0 4px rgba(124, 58, 237, .18); }
  .ds-games-header-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
</style>
<style>
  .ds-games-topbar { height: 10px; background: linear-gradient(90deg, #7c3aed 0 32%, #a855f7 32% 52%, #f97316 52% 64%, #ef4444 64% 76%, #6d28d9 76% 88%, #22c55e 88% 96%, #facc15 96% 100%); }
  .ds-games-header { display: flex; align-items: center; justify-content: space-between; gap: 18px; padding: 10px 22px; background: #ffffff; color: #111827; font-family: Arial, Helvetica, sans-serif; border-bottom: 2px solid #eef2ff; }
  .ds-games-title { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .ds-games-eyebrow { margin: 0; color: #a855f7; font-size: .72rem; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; }
  .ds-games-eyebrow a { color: inherit; text-decoration: none; }
  .ds-games-h1 { margin: 0; color: #7c3aed; font-size: 1.4rem; font-weight: 800; line-height: 1; }
  .ds-games-home { display: inline-flex; align-items: center; justify-content: center; min-height: 36px; padding: 0 14px; color: #ffffff; background: #7c3aed; border-radius: 8px; font: 700 .9rem Arial, sans-serif; text-decoration: none; white-space: nowrap; }
  .ds-games-home:hover { background: #6d28d9; }

  * { box-sizing: border-box; }
  :root { --bg: #0b0a1f; --panel: #15132e; --ink: #e0d8ff; --muted: #8a82c2; --line: #2d2b54; --accent: #a855f7; }
  body { margin: 0; min-height: 100vh; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--ink); }
  .shell { max-width: 760px; margin: 0 auto; padding: 24px 16px 40px; }
  h1.game-title { margin: 0 0 14px; color: var(--accent); font-size: clamp(1.4rem, 4vw, 2rem); }
  p.lede { margin: 0 0 18px; color: var(--muted); }
  .controls { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; padding: 14px; background: var(--panel); border: 2px solid var(--line); border-radius: 12px; margin-bottom: 18px; }
  .group { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .group .gl { font-size: .68rem; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-right: 4px; font-weight: 800; }
  .btn { background: transparent; color: var(--ink); border: 2px solid var(--line); border-radius: 8px; padding: 7px 12px; font-weight: 800; cursor: pointer; font-size: .85rem; }
  .btn:hover { border-color: var(--accent); }
  .btn.active { border-color: var(--accent); background: rgba(168,85,247,0.12); color: var(--accent); }
  .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .metric { margin-left: auto; }
  .metric .label { font-size: .6rem; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; margin-right: 6px; font-weight: 800; }
  .metric .val { font-size: 1.2rem; font-weight: 900; color: #ef4444; }
  .metric .val.cleared { color: #22c55e; }
  .canvas-wrap { padding: 14px; background: var(--panel); border: 2px solid var(--line); border-radius: 14px; }
  canvas { display: block; width: 100%; max-width: 600px; aspect-ratio: 1; margin: 0 auto; touch-action: none; background: #0b0a1f; border-radius: 8px; cursor: grab; }
  canvas:active { cursor: grabbing; }
  .win-card { display: none; margin-top: 18px; padding: 20px; background: linear-gradient(180deg, #14532d, #166534); border: 2px solid #22c55e; border-radius: 12px; text-align: center; color: #d1fae5; }
  .win-card.show { display: block; }
  .win-card h2 { margin: 0 0 6px; color: #4ade80; }
</style>
</head>
<body>
<div class="ds-games-topbar"></div>
<header class="ds-games-header">
  <div class="ds-games-title">
    <p class="ds-games-eyebrow"><a href="../../pages/features.html" data-i18n="header.eyebrow">DrawSplat&trade; Games</a></p>
    <h1 class="ds-games-h1" data-i18n="header.h1">Untangle</h1>
  </div>
  <div class="ds-games-header-actions">
    <div class="i18n-picker" data-i18n-picker></div>
    <a class="ds-games-home" href="../../index.html" data-i18n="header.home">Home</a>
  </div>
</header>

<div class="shell">
  <h1 class="game-title" data-i18n="game.title">Drag the nodes until no lines cross.</h1>
  <p class="lede" data-i18n="game.lede">Each line glows crimson while it intersects another. When every edge turns emerald you've cleared the graph.</p>
  <div class="controls">
    <div class="group">
      <span class="gl" data-i18n="group.difficulty">Difficulty</span>
      <button class="btn diff-btn active" data-n="6" data-i18n="diff.beginner">Beginner (6)</button>
      <button class="btn diff-btn" data-n="12" data-i18n="diff.intermediate">Intermediate (12)</button>
      <button class="btn diff-btn" data-n="20" data-i18n="diff.advanced">Advanced (20)</button>
    </div>
    <button class="btn primary" id="newBtn" data-i18n="button.reset">Reset</button>
    <button class="btn" id="skipBtn" data-i18n="button.skip">Skip</button>
    <button class="btn" id="muteBtn" data-i18n-aria-label="button.mute.aria" aria-label="Toggle sound">🔊</button>
    <div class="metric"><span class="label" data-i18n="metric.crossings">Crossings</span><span class="val" id="crossings">--</span></div>
  </div>
  <div class="canvas-wrap">
    <canvas id="board" width="600" height="600" data-i18n-aria-label="board.aria" aria-label="Untangle graph"></canvas>
  </div>
  <div id="winCard" class="win-card">
    <h2 data-i18n="win.title">Graph cleared.</h2>
    <p data-i18n="win.body">No more intersections — every edge is emerald.</p>
  </div>
</div>

<script src="./locales.js"></script>
<script>
const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");
const W = canvas.width, H = canvas.height;
const crossingsEl = document.getElementById("crossings");
const winCard = document.getElementById("winCard");

let nodes = [];
let edges = [];
let activeNode = null;
let nodeCount = 6;
let audioCtx = null;
let muted = false;
let cleared = false;

function init() {
  cleared = false;
  winCard.classList.remove("show");
  generate();
  recomputeIntersections();
  draw();
}

function generate() {
  nodes = [];
  edges = [];
  const margin = 60;
  // Lay nodes randomly, biased toward edges of the canvas to create crossings naturally
  for (let i = 0; i < nodeCount; i++) {
    nodes.push({
      id: i,
      x: margin + Math.random() * (W - 2 * margin),
      y: margin + Math.random() * (H - 2 * margin),
      r: nodeCount > 14 ? 16 : 20,
      dragging: false,
    });
  }
  // Generate a tangled-ish graph: connect each node to ~2 distant peers
  const targetEdges = Math.floor(nodeCount * 1.6);
  const seen = new Set();
  let attempts = 0;
  while (edges.length < targetEdges && attempts < targetEdges * 8) {
    attempts++;
    const a = Math.floor(Math.random() * nodeCount);
    let b = Math.floor(Math.random() * nodeCount);
    if (a === b) continue;
    const key = a < b ? `${a}-${b}` : `${b}-${a}`;
    if (seen.has(key)) continue;
    seen.add(key);
    edges.push({ a, b, intersects: false });
  }
}

function segmentIntersect(p1, p2, p3, p4) {
  // Skip if they share an endpoint
  if (p1 === p3 || p1 === p4 || p2 === p3 || p2 === p4) return false;
  const x1 = p1.x, y1 = p1.y, x2 = p2.x, y2 = p2.y;
  const x3 = p3.x, y3 = p3.y, x4 = p4.x, y4 = p4.y;
  const den = (y4 - y3) * (x2 - x1) - (x4 - x3) * (y2 - y1);
  if (Math.abs(den) < 1e-9) return false; // parallel
  const ua = ((x4 - x3) * (y1 - y3) - (y4 - y3) * (x1 - x3)) / den;
  const ub = ((x2 - x1) * (y1 - y3) - (y2 - y1) * (x1 - x3)) / den;
  return ua > 1e-6 && ua < 1 - 1e-6 && ub > 1e-6 && ub < 1 - 1e-6;
}

function recomputeIntersections() {
  let count = 0;
  for (const e of edges) e.intersects = false;
  for (let i = 0; i < edges.length; i++) {
    for (let j = i + 1; j < edges.length; j++) {
      const a = nodes[edges[i].a], b = nodes[edges[i].b];
      const c = nodes[edges[j].a], d = nodes[edges[j].b];
      // Share endpoint?
      if (edges[i].a === edges[j].a || edges[i].a === edges[j].b || edges[i].b === edges[j].a || edges[i].b === edges[j].b) continue;
      if (segmentIntersect(a, b, c, d)) {
        edges[i].intersects = true;
        edges[j].intersects = true;
        count++;
      }
    }
  }
  crossingsEl.textContent = count;
  crossingsEl.classList.toggle("cleared", count === 0);
  if (count === 0 && !cleared) {
    cleared = true;
    winCard.classList.add("show");
    playVictory();
  }
}

function draw() {
  ctx.fillStyle = "#0b0a1f";
  ctx.fillRect(0, 0, W, H);
  // Edges
  for (const e of edges) {
    const a = nodes[e.a], b = nodes[e.b];
    ctx.lineWidth = e.intersects ? 5 : 3;
    ctx.strokeStyle = e.intersects ? "#ef4444" : "#22c55e";
    ctx.shadowColor = e.intersects ? "rgba(239,68,68,0.35)" : "rgba(34,197,94,0.4)";
    ctx.shadowBlur = e.intersects ? 12 : 8;
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.stroke();
  }
  ctx.shadowBlur = 0;
  // Nodes
  for (const n of nodes) {
    ctx.beginPath();
    ctx.fillStyle = n === activeNode ? "#a855f7" : "#eef2ff";
    ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.lineWidth = 3;
    ctx.strokeStyle = "#a855f7";
    ctx.stroke();
    // Inner dot
    ctx.beginPath();
    ctx.fillStyle = "#1e1b4b";
    ctx.arc(n.x, n.y, 4, 0, Math.PI * 2);
    ctx.fill();
  }
}

function canvasPoint(evt) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  return { x: (evt.clientX - rect.left) * scaleX, y: (evt.clientY - rect.top) * scaleY };
}

function pickNode(p) {
  // Pick the closest node within (slightly inflated) radius for touch
  let best = null, bestD = Infinity;
  for (const n of nodes) {
    const d = Math.hypot(p.x - n.x, p.y - n.y);
    if (d < n.r + 6 && d < bestD) { best = n; bestD = d; }
  }
  return best;
}

canvas.addEventListener("pointerdown", (e) => {
  canvas.setPointerCapture(e.pointerId);
  const p = canvasPoint(e);
  const n = pickNode(p);
  if (n) { activeNode = n; n.dragging = true; draw(); }
});
canvas.addEventListener("pointermove", (e) => {
  if (!activeNode) return;
  const p = canvasPoint(e);
  activeNode.x = Math.max(20, Math.min(W - 20, p.x));
  activeNode.y = Math.max(20, Math.min(H - 20, p.y));
  recomputeIntersections();
  draw();
});
canvas.addEventListener("pointerup", () => {
  if (activeNode) { activeNode.dragging = false; activeNode = null; draw(); }
});
canvas.addEventListener("pointercancel", () => {
  if (activeNode) { activeNode.dragging = false; activeNode = null; draw(); }
});

document.querySelectorAll(".diff-btn").forEach(b => {
  b.addEventListener("click", () => {
    document.querySelectorAll(".diff-btn").forEach(x => x.classList.remove("active"));
    b.classList.add("active");
    nodeCount = parseInt(b.dataset.n, 10);
    init();
  });
});
document.getElementById("newBtn").addEventListener("click", init);
document.getElementById("skipBtn").addEventListener("click", init);
document.getElementById("muteBtn").addEventListener("click", (e) => {
  muted = !muted;
  e.target.textContent = muted ? "🔇" : "🔊";
});

function ensureAudio() {
  if (muted) return null;
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { audioCtx = null; }
  }
  if (audioCtx && audioCtx.state === "suspended") audioCtx.resume().catch(()=>{});
  return audioCtx;
}
function playVictory() {
  const c = ensureAudio(); if (!c) return;
  [392, 523, 659, 784, 1046].forEach((f, i) => {
    const startT = c.currentTime + i * 0.1;
    const o = c.createOscillator(); const g = c.createGain();
    o.type = "triangle"; o.frequency.setValueAtTime(f, startT);
    g.gain.setValueAtTime(0.0001, startT);
    g.gain.exponentialRampToValueAtTime(0.18, startT + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, startT + 0.4);
    o.connect(g); g.connect(c.destination); o.start(startT); o.stop(startT + 0.45);
  });
}

init();
</script>
</body>
</html>
