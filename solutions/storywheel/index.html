<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Story Wheel Maker</title>
  <style>
    :root {
      --navy: #7c3aed;
      --gold: #a855f7;
      --black: #000000;
      --white: #FFFFFF;
      --red: #ef4444;
      --blue: #6d28d9;
      --yellow: #facc15;
      --orange: #f97316;
      --green: #22c55e;
      --gray-90: #111827;
      --gray-50: #64748b;
      --gray-30: #cbd5e1;
      --gray-10: #eef2ff;
      --bg: #FFFFFF;
      --surface: #FFFFFF;
      --border: #ddd6fe;
      --radius: 8px;
      --shadow: 0 12px 24px rgba(64, 64, 65, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--gray-90);
      background: var(--bg);
    }

    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }

    .top-bar {
      height: 12px;
      background: linear-gradient(
        90deg,
        var(--navy) 0 32%,
        var(--gold) 32% 52%,
        var(--orange) 52% 64%,
        var(--red) 64% 76%,
        var(--blue) 76% 88%,
        var(--green) 88% 96%,
        var(--yellow) 96% 100%
      );
    }

    .page {
      width: min(1320px, calc(100% - 28px));
      margin: 0 auto;
      padding: 22px 0 38px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding-bottom: 18px;
      border-bottom: 2px solid var(--gray-10);
    }

    .title-block { display: grid; gap: 8px; }

    .eyebrow {
      margin: 0;
      color: var(--gold);
      font-size: .78rem;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      color: var(--navy);
      font-size: clamp(2rem, 5vw, 4.2rem);
      line-height: .95;
    }

    .subtitle {
      margin: 0;
      max-width: 820px;
      color: var(--gray-90);
      font-size: 1rem;
      line-height: 1.45;
    }

    .home-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      color: var(--white);
      background: var(--navy);
      border-radius: var(--radius);
      font-weight: 800;
      text-decoration: none;
      white-space: nowrap;
    }

    .app-grid {
      display: grid;
      grid-template-columns: minmax(340px, 460px) 1fr;
      gap: 18px;
      align-items: start;
      padding-top: 20px;
    }

    .panel, .preview {
      border: 2px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .panel h2, .preview h2 {
      margin: 0 0 14px;
      color: var(--black);
      font-size: 1.2rem;
      letter-spacing: 0;
    }

    .field { display: grid; gap: 7px; margin-bottom: 14px; }
    label, .field-title { color: var(--gray-90); font-size: .86rem; font-weight: 800; }

    input, select, textarea {
      width: 100%;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      color: var(--gray-90);
      background: var(--white);
      outline: none;
    }

    textarea { min-height: 74px; resize: vertical; line-height: 1.45; }

    input:focus, select:focus, textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(0, 112, 185, .18);
    }

    .split { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .event-card {
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      margin-bottom: 12px;
      background: #fbfcff;
    }

    .event-card h3 {
      margin: 0 0 10px;
      color: var(--navy);
      font-size: 1rem;
    }

    .button-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .btn {
      min-height: 42px;
      border: 2px solid rgba(30, 57, 141, .22);
      border-radius: var(--radius);
      padding: 9px 12px;
      color: var(--navy);
      background: var(--white);
      font-weight: 800;
      box-shadow: 0 8px 18px rgba(64, 64, 65, .08);
    }

    .btn.primary { color: var(--white); background: var(--navy); border-color: var(--navy); }
    .btn.gold { color: var(--black); background: var(--gold); border-color: var(--gold); }

    .help {
      margin: 0;
      color: var(--gray-50);
      font-size: .85rem;
      line-height: 1.4;
    }

    .canvas-wrap {
      display: grid;
      justify-items: center;
      gap: 14px;
    }

    canvas {
      width: min(100%, 780px);
      height: auto;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      background: var(--white);
    }

    .status {
      min-height: 1.4em;
      color: var(--navy);
      font-weight: 800;
      line-height: 1.4;
    }

    @media print {
      .top-bar, header, .panel, .preview h2, .button-grid, .status { display: none; }
      .page { width: 100%; padding: 0; }
      .app-grid { display: block; }
      .preview { border: 0; box-shadow: none; padding: 0; }
      canvas { width: 7.5in; border: 0; }
    }

    @media (max-width: 1040px) {
      .app-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 640px) {
      .page { width: min(100% - 18px, 1320px); padding-top: 18px; }
      header { align-items: flex-start; flex-direction: column; }
      .split, .button-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="top-bar" aria-hidden="true"></div>
  <div class="page">
    <header>
      <div class="title-block">
        <p class="eyebrow"><a href="../../pages/features.html" style="color:inherit;text-decoration:none">DrawSplat<sup class="tm">TM</sup> Tools</a></p>
        <h1>Story Wheel Maker</h1>
        <p class="subtitle">Choose the 3, 5, or 7 most important events, put them in order, illustrate each wedge, and share a visual story summary.</p>
      </div>
      <a class="home-link" href="../../index.html">Home</a>
    </header>

    <main class="app-grid">
      <section class="panel" aria-label="Story wheel setup">
        <h2>Setup</h2>

        <div class="split">
          <div class="field">
            <label for="storyTitle">Story Title</label>
            <input id="storyTitle" type="text" value="The Story Title">
          </div>
          <div class="field">
            <label for="authorName">Author</label>
            <input id="authorName" type="text" value="Author Name">
          </div>
        </div>

        <div class="split">
          <div class="field">
            <label for="eventCount">Important Events</label>
            <select id="eventCount">
              <option value="3">3 events</option>
              <option value="5" selected>5 events</option>
              <option value="7">7 events</option>
            </select>
          </div>
          <div class="field">
            <label for="wheelMode">Wheel Type</label>
            <select id="wheelMode">
              <option value="summary" selected>Story Summary</option>
              <option value="multimedia">Multimedia Summary</option>
              <option value="sequence">Sequencing Practice</option>
            </select>
          </div>
        </div>

        <div id="events"></div>

        <div class="button-grid">
          <button class="btn primary" id="renderBtn">Update Wheel</button>
          <button class="btn gold" id="rotateBtn">Spin Preview</button>
          <button class="btn" id="printBtn">Print</button>
          <button class="btn" id="saveBtn">Save PNG</button>
          <button class="btn" id="copyLinkBtn">Copy Link</button>
          <button class="btn" id="clearBtn">Clear Events</button>
        </div>
        <p class="help" style="margin-top:12px;">Use short event summaries. Add an image URL or upload a picture for each wedge when students illustrate their event.</p>
        <div class="status" id="status" role="status" aria-live="polite"></div>
      </section>

      <section class="preview" aria-label="Story wheel preview">
        <h2>Preview</h2>
        <div class="canvas-wrap">
          <canvas id="wheelCanvas" width="1600" height="1600" aria-label="Story wheel preview"></canvas>
        </div>
      </section>
    </main>
  </div>

  <script>
    const $ = (sel) => document.querySelector(sel);
    const $$ = (sel) => [...document.querySelectorAll(sel)];
    const canvas = $("#wheelCanvas");
    const ctx = canvas.getContext("2d");
    const colors = ["#a855f7", "#7c3aed", "#6d28d9", "#22c55e", "#ef4444", "#f97316", "#facc15"];
    const imageCache = new Map();
    let rotation = -Math.PI / 2;

    function defaults(count) {
      const base = [
        ["Beginning", "Introduce the setting, characters, and problem."],
        ["Event 2", "Describe an important early event."],
        ["Middle", "Show how the problem develops."],
        ["Event 4", "Describe a turning point or major detail."],
        ["Ending", "Explain how the story ends or what changes."],
        ["Reflection", "Add a key lesson, theme, or final insight."],
        ["Share", "Prepare to explain this event to others."]
      ];
      if (count === 3) return [base[0], base[2], base[4]];
      if (count === 5) return base.slice(0, 5);
      return base;
    }

    function eventData() {
      return $$(".event-card").map(card => ({
        label: card.querySelector(".event-label").value.trim(),
        text: card.querySelector(".event-text").value.trim(),
        image: card.querySelector(".event-image").value.trim()
      }));
    }

    function buildEventInputs(keep = false) {
      const existing = keep ? eventData() : [];
      const count = Number($("#eventCount").value);
      const fallback = defaults(count);
      $("#events").innerHTML = "";
      for (let i = 0; i < count; i++) {
        const data = existing[i] || { label: fallback[i][0], text: fallback[i][1], image: "" };
        const card = document.createElement("section");
        card.className = "event-card";
        card.innerHTML = `
          <h3>Wedge ${i + 1}</h3>
          <div class="field">
            <label>Event Label</label>
            <input class="event-label" type="text" value="${escapeAttr(data.label)}">
          </div>
          <div class="field">
            <label>Written Explanation</label>
            <textarea class="event-text">${escapeHTML(data.text)}</textarea>
          </div>
          <div class="field">
            <label>Image URL or Upload</label>
            <input class="event-image" type="text" value="${escapeAttr(data.image)}" placeholder="https://...">
            <input class="event-upload" type="file" accept="image/*">
          </div>
        `;
        $("#events").appendChild(card);
      }
      $$(".event-upload").forEach((input, index) => {
        input.addEventListener("change", event => {
          const file = event.target.files && event.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = () => {
            $$(".event-image")[index].value = reader.result;
            renderWheel();
          };
          reader.readAsDataURL(file);
        });
      });
      $$("#events input, #events textarea").forEach(el => el.addEventListener("input", renderWheel));
      renderWheel();
    }

    function getImage(src) {
      if (!src) return null;
      if (imageCache.has(src)) return imageCache.get(src);
      const img = new Image();
      img.crossOrigin = "anonymous";
      img.onload = renderWheel;
      img.src = src;
      imageCache.set(src, img);
      return img;
    }

    function renderWheel() {
      const events = eventData();
      const W = canvas.width;
      const H = canvas.height;
      const cx = W / 2;
      const cy = H / 2;
      const r = 710;
      const inner = 175;
      const slice = Math.PI * 2 / events.length;
      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = "#FFFFFF";
      ctx.fillRect(0, 0, W, H);

      events.forEach((event, i) => {
        const start = rotation + i * slice;
        const end = start + slice;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, r, start, end);
        ctx.closePath();
        ctx.fillStyle = colors[i % colors.length];
        ctx.fill();
        ctx.strokeStyle = "#FFFFFF";
        ctx.lineWidth = 8;
        ctx.stroke();

        ctx.save();
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, r - 18, start + .02, end - .02);
        ctx.closePath();
        ctx.clip();

        const mid = start + slice / 2;
        const img = getImage(event.image);
        if (img && img.complete && img.naturalWidth) {
          const ix = cx + Math.cos(mid) * r * .52;
          const iy = cy + Math.sin(mid) * r * .52;
          const size = r * .32;
          ctx.save();
          ctx.translate(ix, iy);
          ctx.rotate(mid + Math.PI / 2);
          ctx.drawImage(img, -size / 2, -size / 2, size, size);
          ctx.restore();
        }

        ctx.translate(cx + Math.cos(mid) * r * .58, cy + Math.sin(mid) * r * .58);
        ctx.rotate(mid + Math.PI / 2);
        ctx.fillStyle = readableText(colors[i % colors.length]);
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.font = "900 42px Arial, Helvetica, sans-serif";
        wrapText(event.label || "Event " + (i + 1), 0, -95, 245, 46);
        ctx.font = "700 27px Arial, Helvetica, sans-serif";
        wrapText(event.text || "", 0, 30, 285, 32, 5);
        ctx.restore();
      });

      ctx.beginPath();
      ctx.arc(cx, cy, inner, 0, Math.PI * 2);
      ctx.fillStyle = "#FFFFFF";
      ctx.fill();
      ctx.lineWidth = 8;
      ctx.strokeStyle = "#7c3aed";
      ctx.stroke();
      ctx.fillStyle = "#7c3aed";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = "900 44px Arial, Helvetica, sans-serif";
      wrapText($("#storyTitle").value || "Story Title", cx, cy - 32, 285, 46, 3);
      ctx.fillStyle = "#404041";
      ctx.font = "700 28px Arial, Helvetica, sans-serif";
      wrapText($("#authorName").value || "Author", cx, cy + 70, 260, 32, 2);

      $("#status").textContent = events.length + " story events ready.";
    }

    function wrapText(text, x, y, maxWidth, lineHeight, maxLines = 4) {
      const words = String(text).split(/\s+/).filter(Boolean);
      const lines = [];
      let line = "";
      for (const word of words) {
        const test = line ? line + " " + word : word;
        if (ctx.measureText(test).width > maxWidth && line) {
          lines.push(line);
          line = word;
        } else {
          line = test;
        }
      }
      if (line) lines.push(line);
      lines.slice(0, maxLines).forEach((ln, i) => ctx.fillText(ln, x, y + i * lineHeight));
    }

    function readableText(hex) {
      const c = hex.replace("#", "");
      const r = parseInt(c.slice(0, 2), 16);
      const g = parseInt(c.slice(2, 4), 16);
      const b = parseInt(c.slice(4, 6), 16);
      return (r * 299 + g * 587 + b * 114) / 1000 > 150 ? "#000000" : "#FFFFFF";
    }

    function config() {
      return {
        title: $("#storyTitle").value,
        author: $("#authorName").value,
        count: $("#eventCount").value,
        mode: $("#wheelMode").value,
        events: eventData()
      };
    }

    function b64urlEncode(str) {
      const bytes = new TextEncoder().encode(str);
      let bin = "";
      for (const b of bytes) bin += String.fromCharCode(b);
      return btoa(bin).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
    }

    function b64urlDecode(s) {
      const pad = s.length % 4 === 0 ? "" : "=".repeat(4 - (s.length % 4));
      const norm = s.replace(/-/g, "+").replace(/_/g, "/") + pad;
      const bin = atob(norm);
      const bytes = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      return new TextDecoder().decode(bytes);
    }

    function loadHash() {
      const hash = window.location.hash || "";
      if (!hash.startsWith("#s=")) return false;
      try {
        const data = JSON.parse(b64urlDecode(hash.slice(3)));
        $("#storyTitle").value = data.title || "";
        $("#authorName").value = data.author || "";
        $("#eventCount").value = data.count || "5";
        $("#wheelMode").value = data.mode || "summary";
        buildEventInputs(false);
        const cards = $$(".event-card");
        (data.events || []).forEach((event, i) => {
          if (!cards[i]) return;
          cards[i].querySelector(".event-label").value = event.label || "";
          cards[i].querySelector(".event-text").value = event.text || "";
          cards[i].querySelector(".event-image").value = event.image || "";
        });
        renderWheel();
        return true;
      } catch {
        return false;
      }
    }

    function copyLink() {
      const url = new URL(window.location.href);
      url.hash = "s=" + b64urlEncode(JSON.stringify(config()));
      if (navigator.clipboard) {
        navigator.clipboard.writeText(url.toString()).then(() => $("#status").textContent = "Story wheel link copied.");
      } else {
        window.prompt("Copy this story wheel link:", url.toString());
      }
    }

    function savePNG() {
      const a = document.createElement("a");
      a.href = canvas.toDataURL("image/png");
      a.download = "story-wheel.png";
      a.click();
    }

    function escapeHTML(str) {
      return String(str).replace(/[&<>"']/g, ch => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch]));
    }

    function escapeAttr(str) {
      return escapeHTML(str).replace(/"/g, "&quot;");
    }

    $("#eventCount").addEventListener("change", () => buildEventInputs(true));
    $("#storyTitle").addEventListener("input", renderWheel);
    $("#authorName").addEventListener("input", renderWheel);
    $("#wheelMode").addEventListener("change", renderWheel);
    $("#renderBtn").addEventListener("click", renderWheel);
    $("#rotateBtn").addEventListener("click", () => {
      rotation += Math.PI * 2 / Number($("#eventCount").value);
      renderWheel();
    });
    $("#printBtn").addEventListener("click", () => window.print());
    $("#saveBtn").addEventListener("click", savePNG);
    $("#copyLinkBtn").addEventListener("click", copyLink);
    $("#clearBtn").addEventListener("click", () => {
      $$(".event-label, .event-text, .event-image").forEach(el => el.value = "");
      renderWheel();
    });

    if (!loadHash()) buildEventInputs(false);
  </script></body>
</html>
