<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="doc.title">Rubric Builder</title>
  <script src="../../assets/js/widget-i18n.js"></script>
  <style>
    .i18n-picker select { padding: 9px 12px; border: 2px solid #e5e7eb; border-radius: 8px; background: #fff; color: #111827; font-weight: 700; font-size: .85rem; cursor: pointer; min-height: 42px; }
    .i18n-picker select:focus { border-color: #7c3aed; outline: none; box-shadow: 0 0 0 4px rgba(124, 58, 237, .18); }
    .header-actions { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  </style>
  <style>
    :root {
      --navy: #7c3aed;
      --gold: #a855f7;
      --red: #ef4444;
      --orange: #f97316;
      --green: #22c55e;
      --blue: #2563eb;
      --ink: #111827;
      --muted: #64748b;
      --line: #ddd6fe;
      --soft: #eef2ff;
      --panel: #ffffff;
      --bg: #ffffff;
      --radius: 8px;
      --shadow: 0 12px 24px rgba(64, 64, 65, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background: var(--bg);
    }

    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }

    .top-bar {
      height: 12px;
      background: linear-gradient(90deg, var(--navy) 0 32%, var(--gold) 32% 52%, var(--orange) 52% 64%, var(--red) 64% 76%, var(--blue) 76% 88%, var(--green) 88% 100%);
    }

    .page {
      width: min(1400px, calc(100% - 28px));
      margin: 0 auto;
      padding: 22px 0 38px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding-bottom: 18px;
      border-bottom: 2px solid var(--soft);
    }

    .title-block { display: grid; gap: 8px; }

    .eyebrow {
      margin: 0;
      color: var(--gold);
      font-size: .78rem;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      color: var(--navy);
      font-size: clamp(2rem, 5vw, 4.2rem);
      line-height: .95;
    }

    .subtitle {
      margin: 0;
      max-width: 820px;
      color: var(--ink);
      font-size: 1rem;
      line-height: 1.45;
    }

    .home-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      color: #fff;
      background: var(--navy);
      border-radius: var(--radius);
      font-weight: 800;
      text-decoration: none;
      white-space: nowrap;
    }

    .app-grid {
      display: grid;
      grid-template-columns: minmax(320px, 420px) 1fr;
      gap: 18px;
      align-items: start;
      padding-top: 20px;
    }

    .panel, .preview {
      border: 2px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .panel { padding: 18px; }
    .preview { padding: 18px; overflow: auto; }

    .panel h2 {
      margin: 0 0 14px;
      color: #000;
      font-size: 1.2rem;
    }

    .field {
      display: grid;
      gap: 7px;
      margin-bottom: 13px;
    }

    label {
      color: var(--muted);
      font-size: .82rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    input, select, textarea {
      width: 100%;
      border: 2px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--ink);
      padding: 10px;
    }

    textarea { min-height: 86px; resize: vertical; line-height: 1.35; }

    .split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 12px 0;
    }

    button {
      min-height: 38px;
      border: 2px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--ink);
      padding: 8px 12px;
      font-weight: 800;
    }

    button.primary {
      border-color: var(--navy);
      background: var(--navy);
      color: #fff;
    }

    button.danger { color: #991b1b; border-color: #fecaca; }

    .criteria-list {
      display: grid;
      gap: 10px;
      max-height: 420px;
      overflow: auto;
      padding-right: 2px;
    }

    .criteria-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fafbff;
      padding: 10px;
      display: grid;
      gap: 8px;
    }

    .criteria-head {
      display: grid;
      grid-template-columns: 1fr 74px auto;
      gap: 8px;
      align-items: center;
    }

    .small-input { padding: 8px; }

    .status {
      min-height: 20px;
      color: var(--muted);
      font-size: .88rem;
      line-height: 1.35;
    }

    .rubric-meta {
      display: grid;
      gap: 4px;
      margin-bottom: 16px;
    }

    .rubric-meta h2 {
      margin: 0;
      color: var(--navy);
      font-size: clamp(1.8rem, 4vw, 3rem);
      line-height: 1;
    }

    .rubric-meta p { margin: 0; color: var(--muted); line-height: 1.35; }

    table {
      width: 100%;
      min-width: 760px;
      border-collapse: collapse;
      table-layout: fixed;
      background: #fff;
    }

    th, td {
      border: 2px solid #e5e7eb;
      padding: 10px;
      vertical-align: top;
      text-align: left;
    }

    th {
      background: #f5f3ff;
      color: var(--navy);
      font-weight: 900;
    }

    th:first-child, td:first-child { width: 190px; }

    .criterion-name {
      display: block;
      color: #000;
      font-weight: 900;
      margin-bottom: 6px;
    }

    .criterion-points {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border-radius: 999px;
      background: var(--soft);
      color: var(--navy);
      padding: 3px 8px;
      font-size: .78rem;
      font-weight: 900;
    }

    .descriptor {
      min-height: 72px;
      line-height: 1.35;
      white-space: pre-wrap;
    }

    @media (max-width: 960px) {
      header, .app-grid { grid-template-columns: 1fr; }
      header { align-items: flex-start; flex-direction: column; }
      .app-grid { display: block; }
      .preview { margin-top: 18px; }
    }

    @media print {
      .top-bar, header, .panel { display: none !important; }
      .page { width: 100%; padding: 0; }
      .app-grid { display: block; padding: 0; }
      .preview { border: 0; box-shadow: none; padding: 0; overflow: visible; }
      table { min-width: 0; font-size: 10.5pt; }
      th, td { padding: 7px; border-color: #999; }
    }
  </style>
</head>
<body>
  <div class="top-bar"></div>
  <main class="page">
    <header>
      <div class="title-block">
        <p class="eyebrow"><a href="../../pages/features.html" style="color:inherit;text-decoration:none" data-i18n-html="header.eyebrow">DrawSplat<sup class="tm">TM</sup> Classroom Widget</a></p>
        <h1 data-i18n="header.h1">Rubric Builder</h1>
        <p class="subtitle" data-i18n="header.subtitle">Create a classroom rubric with editable criteria, performance levels, point values, and ready-to-print descriptors.</p>
      </div>
      <div class="header-actions">
        <div class="i18n-picker" data-i18n-picker></div>
        <a class="home-link" href="../../index.html" data-i18n="header.home">Home</a>
      </div>
    </header>

    <section class="app-grid">
      <aside class="panel">
        <h2 data-i18n="panel.h2">Rubric setup</h2>

        <div class="field">
          <label for="rubricTitle" data-i18n="field.title">Title</label>
          <input id="rubricTitle" value="">
        </div>

        <div class="field">
          <label for="rubricDescription" data-i18n="field.description">Description</label>
          <textarea id="rubricDescription"></textarea>
        </div>

        <div class="split">
          <div class="field">
            <label for="templateSelect" data-i18n="field.template">Template</label>
            <select id="templateSelect">
              <option value="project" data-i18n="tpl.project">Project</option>
              <option value="writing" data-i18n="tpl.writing">Writing</option>
              <option value="presentation" data-i18n="tpl.presentation">Presentation</option>
              <option value="collaboration" data-i18n="tpl.collaboration">Collaboration</option>
              <option value="blank" data-i18n="tpl.blank">Blank</option>
            </select>
          </div>
          <div class="field">
            <label for="levelPreset" data-i18n="field.levelPreset">Levels</label>
            <select id="levelPreset">
              <option value="4" data-i18n="levelPreset.4">4 levels</option>
              <option value="3" data-i18n="levelPreset.3">3 levels</option>
              <option value="5" data-i18n="levelPreset.5">5 levels</option>
            </select>
          </div>
        </div>

        <div class="button-row">
          <button class="primary" id="applyTemplateBtn" data-i18n="button.applyTemplate">Apply Template</button>
          <button id="addCriterionBtn" data-i18n="button.addCriterion">Add Criterion</button>
          <button id="addLevelBtn" data-i18n="button.addLevel">Add Level</button>
        </div>

        <div class="field">
          <label data-i18n="label.levels">Performance levels</label>
          <div id="levelsList" class="criteria-list"></div>
        </div>

        <div class="field">
          <label data-i18n="label.criteria">Criteria</label>
          <div id="criteriaList" class="criteria-list"></div>
        </div>

        <div class="button-row">
          <button id="copyBtn" data-i18n="button.copy">Copy Text</button>
          <button id="downloadCsvBtn" data-i18n="button.downloadCsv">Download CSV</button>
          <button id="printBtn" data-i18n="button.print">Print</button>
          <button class="danger" id="resetBtn" data-i18n="button.reset">Reset</button>
        </div>
        <div id="status" class="status" role="status" aria-live="polite"></div>
      </aside>

      <section class="preview" data-i18n-aria-label="preview.aria" aria-label="Rubric preview">
        <div class="rubric-meta">
          <h2 id="previewTitle"></h2>
          <p id="previewDescription"></p>
          <p id="previewTotal"></p>
        </div>
        <div id="rubricTableWrap"></div>
      </section>
    </section>
  </main>

  <script src="./locales.js"></script>
  <script>
    const t = (k, vars) => WidgetI18n.t(k, vars);
    // Templates store criterion KEYS so each render pulls the active locale's
    // translated name. The auto-generated descriptors flow through stems.
    const templates = {
      project:       { titleKey: 'tplTitle.project',       descKey: 'tplDesc.project',       criteria: [['crit.project.1', 4], ['crit.project.2', 4], ['crit.project.3', 4], ['crit.project.4', 4]] },
      writing:       { titleKey: 'tplTitle.writing',       descKey: 'tplDesc.writing',       criteria: [['crit.writing.1', 4], ['crit.writing.2', 4], ['crit.writing.3', 4], ['crit.writing.4', 4]] },
      presentation:  { titleKey: 'tplTitle.presentation',  descKey: 'tplDesc.presentation',  criteria: [['crit.presentation.1', 4], ['crit.presentation.2', 4], ['crit.presentation.3', 4], ['crit.presentation.4', 4]] },
      collaboration: { titleKey: 'tplTitle.collaboration', descKey: 'tplDesc.collaboration', criteria: [['crit.collaboration.1', 4], ['crit.collaboration.2', 4], ['crit.collaboration.3', 4], ['crit.collaboration.4', 4]] },
      blank:         { titleKey: 'tplTitle.blank',         descKey: 'tplDesc.blank',         criteria: [['__blank__1', 4], ['__blank__2', 4], ['__blank__3', 4]] }
    };

    // Level sets translate at boot via these keys.
    const levelSets = {
      3: ['level.meets', 'level.developing', 'level.beginning'],
      4: ['level.exceeds', 'level.meets', 'level.developing', 'level.beginning'],
      5: ['level.advanced', 'level.proficient', 'level.developing', 'level.beginning', 'level.notYet']
    };

    let state = {
      title: '',
      description: '',
      levels: [],
      criteria: []
    };

    const $ = id => document.getElementById(id);

    const STEMS = ['descStem.strong', 'descStem.clear', 'descStem.partial', 'descStem.limited', 'descStem.notYet'];
    function descriptor(criterion, level, index) {
      const key = STEMS[index] || STEMS[STEMS.length - 1];
      return t(key, { criterion: String(criterion).toLowerCase() });
    }

    // Resolve a criterion key (e.g. "crit.project.1" or "__blank__2") into its
    // current-language display name.
    function resolveCriterionName(keyOrName) {
      if (typeof keyOrName !== 'string') return String(keyOrName);
      if (keyOrName.startsWith('__blank__')) {
        const n = +keyOrName.slice('__blank__'.length);
        return t('crit.blankN', { n });
      }
      if (keyOrName.startsWith('crit.')) return t(keyOrName);
      return keyOrName;
    }

    // Track which template was last applied + a snapshot of the strings it
    // produced. Used by the language-change handler to swap defaults.
    let lastTemplate = 'project';
    let lastSnapshot = { title: '', description: '', levels: [], critNames: [] };

    function snapshotTemplate(name) {
      const tpl = templates[name] || templates.project;
      const levelKeys = levelSets[$('levelPreset').value] || levelSets[4];
      return {
        title: t(tpl.titleKey),
        description: t(tpl.descKey),
        levels: levelKeys.map(k => t(k)),
        critNames: tpl.criteria.map(([k]) => resolveCriterionName(k)),
      };
    }

    function applyTemplate(name = $('templateSelect').value) {
      const tpl = templates[name] || templates.project;
      const levelKeys = levelSets[$('levelPreset').value] || levelSets[4];
      const levels = levelKeys.map(k => t(k));
      state = {
        title: t(tpl.titleKey),
        description: t(tpl.descKey),
        levels,
        criteria: tpl.criteria.map(([critKey, points]) => {
          const displayName = resolveCriterionName(critKey);
          return {
            id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random()),
            name: displayName,
            points,
            descriptions: levels.map((level, i) => descriptor(displayName, level, i))
          };
        })
      };
      lastTemplate = name in templates ? name : 'project';
      lastSnapshot = snapshotTemplate(lastTemplate);
      syncFields();
      render();
      setStatus(t('status.templateApplied'));
    }

    function syncFields() {
      $('rubricTitle').value = state.title;
      $('rubricDescription').value = state.description;
    }

    function updateStateFromFields() {
      state.title = $('rubricTitle').value.trim() || t('titleFallback');
      state.description = $('rubricDescription').value.trim();
    }

    function setStatus(text) {
      $('status').textContent = text || '';
      if (text) setTimeout(() => { if ($('status').textContent === text) $('status').textContent = ''; }, 2400);
    }

    function renderLevels() {
      const removeLabel = t('button.remove');
      const ariaLevel = t('aria.levelName');
      $('levelsList').innerHTML = state.levels.map((level, index) => `
        <div class="criteria-card">
          <div class="criteria-head">
            <input class="small-input" value="${escapeAttr(level)}" data-level-name="${index}" aria-label="${escapeAttr(ariaLevel)}">
            <span></span>
            <button class="danger" data-remove-level="${index}" ${state.levels.length <= 2 ? 'disabled' : ''}>${escapeHtml(removeLabel)}</button>
          </div>
        </div>
      `).join('');
    }

    function renderCriteriaEditor() {
      const removeLabel = t('button.remove');
      const ariaCrit = t('aria.criterionName');
      const ariaPts = t('aria.points');
      $('criteriaList').innerHTML = state.criteria.map((criterion, index) => `
        <div class="criteria-card">
          <div class="criteria-head">
            <input class="small-input" value="${escapeAttr(criterion.name)}" data-criterion-name="${index}" aria-label="${escapeAttr(ariaCrit)}">
            <input class="small-input" type="number" min="0" max="100" value="${criterion.points}" data-criterion-points="${index}" aria-label="${escapeAttr(ariaPts)}">
            <button class="danger" data-remove-criterion="${index}">${escapeHtml(removeLabel)}</button>
          </div>
          ${state.levels.map((level, levelIndex) => `
            <textarea data-description="${index}:${levelIndex}" aria-label="${escapeAttr(criterion.name)} ${escapeAttr(level)}">${escapeHtml(criterion.descriptions[levelIndex] || '')}</textarea>
          `).join('')}
        </div>
      `).join('');
    }

    function renderPreview() {
      updateStateFromFields();
      $('previewTitle').textContent = state.title;
      $('previewDescription').textContent = state.description;
      const total = state.criteria.reduce((sum, c) => sum + (+c.points || 0), 0);
      $('previewTotal').textContent = t('preview.totalPoints', { n: total });
      const critCol = t('preview.criteriaCol');
      const table = `
        <table>
          <thead>
            <tr>
              <th>${escapeHtml(critCol)}</th>
              ${state.levels.map(level => `<th>${escapeHtml(level)}</th>`).join('')}
            </tr>
          </thead>
          <tbody>
            ${state.criteria.map(criterion => `
              <tr>
                <td><span class="criterion-name">${escapeHtml(criterion.name)}</span><span class="criterion-points">${escapeHtml(t('preview.points', { n: +criterion.points || 0 }))}</span></td>
                ${state.levels.map((level, i) => `<td><div class="descriptor">${escapeHtml(criterion.descriptions[i] || '')}</div></td>`).join('')}
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
      $('rubricTableWrap').innerHTML = table;
    }

    function render() {
      renderLevels();
      renderCriteriaEditor();
      renderPreview();
    }

    function addCriterion() {
      const name = t('crit.blankN', { n: state.criteria.length + 1 });
      state.criteria.push({
        id: String(Date.now() + Math.random()),
        name,
        points: 4,
        descriptions: state.levels.map((level, i) => descriptor(name, level, i))
      });
      render();
    }

    function addLevel() {
      state.levels.push(t('level.numericN', { n: state.levels.length + 1 }));
      state.criteria.forEach(c => c.descriptions.push(descriptor(c.name, '', state.levels.length - 1)));
      render();
    }

    function normalizeDescriptions() {
      state.criteria.forEach(c => {
        while (c.descriptions.length < state.levels.length) c.descriptions.push('');
        c.descriptions = c.descriptions.slice(0, state.levels.length);
      });
    }

    function rubricText() {
      updateStateFromFields();
      const totalPts = state.criteria.reduce((sum, c) => sum + (+c.points || 0), 0);
      const lines = [state.title, state.description, '', t('text.totalLabel', { n: totalPts }), ''];
      state.criteria.forEach(c => {
        lines.push(`${c.name} (${t('preview.points', { n: +c.points || 0 })})`);
        state.levels.forEach((level, i) => lines.push(`- ${level}: ${c.descriptions[i] || ''}`));
        lines.push('');
      });
      return lines.join('\n');
    }

    function downloadCsv() {
      updateStateFromFields();
      const rows = [[t('csv.criteriaCol'), t('csv.pointsCol'), ...state.levels]];
      state.criteria.forEach(c => rows.push([c.name, c.points, ...state.levels.map((_, i) => c.descriptions[i] || '')]));
      const csv = rows.map(row => row.map(value => `"${String(value).replaceAll('"', '""')}"`).join(',')).join('\n');
      const blob = new Blob([csv], { type: 'text/csv' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      // Filename slugifies the title; ASCII-only patterns (regex above) mean
      // non-Latin titles fall back to the localized "rubric" word.
      const slug = (state.title || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
      a.download = (slug || t('csv.fileFallback')) + '.csv';
      a.click();
      URL.revokeObjectURL(a.href);
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    function escapeAttr(value) { return escapeHtml(value).replaceAll('\n', '&#10;'); }

    document.addEventListener('input', event => {
      const el = event.target;
      if (el.id === 'rubricTitle' || el.id === 'rubricDescription') renderPreview();
      if (el.dataset.levelName !== undefined) {
        state.levels[+el.dataset.levelName] = el.value;
        renderPreview();
      }
      if (el.dataset.criterionName !== undefined) {
        state.criteria[+el.dataset.criterionName].name = el.value;
        renderPreview();
      }
      if (el.dataset.criterionPoints !== undefined) {
        state.criteria[+el.dataset.criterionPoints].points = +el.value || 0;
        renderPreview();
      }
      if (el.dataset.description) {
        const [criterionIndex, levelIndex] = el.dataset.description.split(':').map(Number);
        state.criteria[criterionIndex].descriptions[levelIndex] = el.value;
        renderPreview();
      }
    });

    document.addEventListener('click', async event => {
      const removeCriterion = event.target.closest('[data-remove-criterion]');
      const removeLevel = event.target.closest('[data-remove-level]');
      if (removeCriterion) {
        state.criteria.splice(+removeCriterion.dataset.removeCriterion, 1);
        render();
      }
      if (removeLevel && state.levels.length > 2) {
        const index = +removeLevel.dataset.removeLevel;
        state.levels.splice(index, 1);
        state.criteria.forEach(c => c.descriptions.splice(index, 1));
        normalizeDescriptions();
        render();
      }
    });

    $('applyTemplateBtn').addEventListener('click', () => applyTemplate());
    $('addCriterionBtn').addEventListener('click', addCriterion);
    $('addLevelBtn').addEventListener('click', addLevel);
    $('levelPreset').addEventListener('change', () => applyTemplate());
    $('printBtn').addEventListener('click', () => window.print());
    $('downloadCsvBtn').addEventListener('click', downloadCsv);
    $('copyBtn').addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(rubricText());
        setStatus(t('status.copied'));
      } catch (_) {
        setStatus(t('status.copyFail'));
      }
    });
    $('resetBtn').addEventListener('click', () => applyTemplate('project'));

    applyTemplate('project');

    // On language change: swap title / description / level names / criterion
    // names that still match the previous locale's defaults. Custom text
    // (criterion edits, descriptor edits, free-typed level names) stays.
    window.addEventListener('widget-i18n:changed', () => {
      const tpl = templates[lastTemplate];
      if (!tpl) { render(); return; }
      const fresh = snapshotTemplate(lastTemplate);
      if (state.title === lastSnapshot.title) state.title = fresh.title;
      if (state.description === lastSnapshot.description) state.description = fresh.description;
      state.levels = state.levels.map((lvl, i) =>
        lastSnapshot.levels[i] !== undefined && lvl === lastSnapshot.levels[i] ? fresh.levels[i] : lvl);
      state.criteria.forEach((c, i) => {
        if (lastSnapshot.critNames[i] !== undefined && c.name === lastSnapshot.critNames[i]) {
          c.name = fresh.critNames[i];
        }
      });
      lastSnapshot = fresh;
      syncFields();
      render();
