<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">Concept Map illustration</title>
  <desc id="desc">A DrawSplat concept map with editable idea nodes, live connectors, a node image, and a visible web link.</desc>
  <defs>
    <linearGradient id="nodeBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#dbeafe"/>
      <stop offset="1" stop-color="#eff6ff"/>
    </linearGradient>
    <linearGradient id="nodeGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#dcfce7"/>
      <stop offset="1" stop-color="#f0fdf4"/>
    </linearGradient>
    <linearGradient id="nodeGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fef3c7"/>
      <stop offset="1" stop-color="#fffbeb"/>
    </linearGradient>
    <linearGradient id="nodePink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fce7f3"/>
      <stop offset="1" stop-color="#fff1f2"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="960" height="520" rx="24" fill="#ffffff"/>
  <rect x="1" y="1" width="958" height="518" rx="24" fill="none" stroke="#d7ddea"/>
  <text x="30" y="48" font-family="Inter,Arial,sans-serif" font-size="24" font-weight="800" fill="#111827">Concept Map</text>
  <rect x="30" y="78" width="252" height="388" rx="14" fill="#f8fafc" stroke="#d3d9e8"/>
  <text x="50" y="112" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="800" fill="#667085">Selected node</text>
  <rect x="50" y="132" width="212" height="42" rx="8" fill="#fff" stroke="#d3d9e8"/>
  <text x="66" y="159" font-family="Inter,Arial,sans-serif" font-size="16" fill="#111827">Ecosystems</text>
  <g font-family="Inter,Arial,sans-serif" font-size="13" font-weight="800" fill="#111827">
    <rect x="50" y="202" width="96" height="38" rx="8" fill="#fff" stroke="#d3d9e8"/>
    <text x="98" y="226" text-anchor="middle">Add Child</text>
    <rect x="158" y="202" width="104" height="38" rx="8" fill="#fff" stroke="#d3d9e8"/>
    <text x="210" y="226" text-anchor="middle">Set Link</text>
    <rect x="50" y="252" width="212" height="38" rx="8" fill="#fff" stroke="#d3d9e8"/>
    <text x="156" y="276" text-anchor="middle">Attach Image</text>
  </g>
  <rect x="50" y="328" width="212" height="92" rx="10" fill="#fff" stroke="#d3d9e8"/>
  <text x="66" y="356" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="800" fill="#667085">Visible link</text>
  <text x="66" y="386" font-family="Inter,Arial,sans-serif" font-size="15" fill="#2563eb">https://example.org/ecosystems</text>
  <rect x="318" y="78" width="612" height="388" rx="14" fill="#fff" stroke="#d3d9e8"/>
  <path d="M606 205 L470 170" stroke="#334155" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M606 205 L752 170" stroke="#334155" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M606 260 L468 340" stroke="#334155" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M606 260 L756 340" stroke="#334155" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <g font-family="Inter,Arial,sans-serif">
    <rect x="514" y="176" width="184" height="112" rx="20" fill="url(#nodeBlue)" stroke="#60a5fa" stroke-width="3"/>
    <text x="606" y="222" text-anchor="middle" font-size="22" font-weight="800" fill="#111827">Ecosystems</text>
    <text x="606" y="252" text-anchor="middle" font-size="14" fill="#475569">living systems</text>
    <rect x="376" y="120" width="160" height="84" rx="18" fill="url(#nodeGreen)" stroke="#22c55e" stroke-width="3"/>
    <text x="456" y="156" text-anchor="middle" font-size="18" font-weight="800" fill="#111827">Producers</text>
    <text x="456" y="180" text-anchor="middle" font-size="13" fill="#475569">plants</text>
    <rect x="684" y="120" width="164" height="84" rx="18" fill="url(#nodeGold)" stroke="#f59e0b" stroke-width="3"/>
    <text x="766" y="156" text-anchor="middle" font-size="18" font-weight="800" fill="#111827">Consumers</text>
    <text x="766" y="180" text-anchor="middle" font-size="13" fill="#475569">animals</text>
    <rect x="370" y="316" width="170" height="92" rx="18" fill="url(#nodePink)" stroke="#f472b6" stroke-width="3"/>
    <text x="455" y="350" text-anchor="middle" font-size="18" font-weight="800" fill="#111827">Decomposers</text>
    <text x="455" y="376" text-anchor="middle" font-size="13" fill="#475569">break matter down</text>
    <rect x="678" y="308" width="180" height="108" rx="18" fill="#f8fafc" stroke="#94a3b8" stroke-width="3"/>
    <circle cx="718" cy="362" r="24" fill="#dcfce7" stroke="#22c55e" stroke-width="3"/>
    <path d="M706 362 C718 334 734 338 730 365 C726 388 708 384 706 362 Z" fill="#16a34a"/>
    <text x="780" y="352" text-anchor="middle" font-size="18" font-weight="800" fill="#111827">Habitat</text>
    <text x="780" y="378" text-anchor="middle" font-size="13" fill="#2563eb">open link</text>
  </g>
</svg>
