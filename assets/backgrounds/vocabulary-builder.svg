<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Vocabulary builder panel background</title>
  <desc id="desc">Vocabulary organizer with word, meaning, sentence, and picture boxes.</desc>
  <rect width="1600" height="900" fill="#fdf2f8"/>
  <rect x="80" y="70" width="1440" height="760" rx="28" fill="#ffffff" stroke="#f9a8d4" stroke-width="6"/>
  <text x="800" y="145" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="800" fill="#9d174d">Vocabulary Builder</text>
  <g fill="#fff7fb" stroke="#f9a8d4" stroke-width="5">
    <rect x="130" y="210" width="610" height="180" rx="18"/>
    <rect x="860" y="210" width="610" height="180" rx="18"/>
    <rect x="130" y="460" width="610" height="300" rx="18"/>
    <rect x="860" y="460" width="610" height="300" rx="18"/>
  </g>
  <g font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#831843">
