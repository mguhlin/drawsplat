    <g transform="translate(124 0)"><rect width="108" height="104" rx="14" fill="#fbfcff" stroke="#d3d9e8"/><rect x="28" y="12" width="52" height="52" rx="12" fill="#bbf7d0"/><text x="54" y="48" font-size="30">✅</text><text x="54" y="86">Check</text></g>
