<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 300" role="img" aria-labelledby="title desc">
  <title id="title">Sticker Library illustration</title>
  <desc id="desc">A sticker library with tiles for star, check, idea, question, smile, book, pencil, pin, search, and globe.</desc>
  <rect width="960" height="300" rx="24" fill="#ffffff"/>
  <rect x="1" y="1" width="958" height="298" rx="24" fill="none" stroke="#d7ddea"/>
  <text x="24" y="42" font-family="Inter,Arial,sans-serif" font-size="24" font-weight="800">Sticker Library</text>
  <g transform="translate(24 70)" font-family="Inter,Arial,sans-serif" font-size="17" text-anchor="middle" fill="#111827">
