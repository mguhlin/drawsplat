    <g transform="translate(372 0)"><rect width="108" height="104" rx="14" fill="#fbfcff" stroke="#d3d9e8"/><rect x="28" y="12" width="52" height="52" rx="12" fill="#dbeafe"/><text x="54" y="48" font-size="30">❓</text><text x="54" y="86">Question</text></g>
    <g transform="translate(496 0)"><rect width="108" height="104" rx="14" fill="#fbfcff" stroke="#d3d9e8"/><rect x="28" y="12" width="52" height="52" rx="12" fill="#fecdd3"/><text x="54" y="48" font-size="30">😀</text><text x="54" y="86">Smile</text></g>
    <g transform="translate(620 0)"><rect width="108" height="104" rx="14" fill="#fbfcff" stroke="#d3d9e8"/><rect x="28" y="12" width="52" height="52" rx="12" fill="#ddd6fe"/><text x="54" y="48" font-size="30">📚</text><text x="54" y="86">Book</text></g>
    <g transform="translate(744 0)"><rect width="108" height="104" rx="14" fill="#fbfcff" stroke="#d3d9e8"/><rect x="28" y="12" width="52" height="52" rx="12" fill="#fed7aa"/><text x="54" y="48" font-size="30">✏️</text><text x="54" y="86">Pencil</text></g>
