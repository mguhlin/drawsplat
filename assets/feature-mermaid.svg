<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">Mermaid Diagram illustration</title>
  <desc id="desc">A Mermaid diagram editor with syntax on the left and a flowchart preview on the right.</desc>
  <rect width="960" height="520" rx="24" fill="#ffffff"/>
  <rect x="1" y="1" width="958" height="518" rx="24" fill="none" stroke="#d7ddea"/>
  <text x="24" y="42" font-family="Inter,Arial,sans-serif" font-size="24" font-weight="800">Mermaid Diagram</text>
  <text x="24" y="88" font-family="Inter,Arial,sans-serif" font-size="17" fill="#111827">Type or paste Mermaid syntax. Preview updates as you type.</text>
  <g font-family="Inter,Arial,sans-serif" font-size="13" font-weight="800">
    <rect x="24" y="112" width="88" height="32" rx="8" fill="#f3f6fc" stroke="#d3d9e8"/><text x="68" y="133" text-anchor="middle" fill="#253044">Flowchart</text>
    <rect x="120" y="112" width="82" height="32" rx="8" fill="#f3f6fc" stroke="#d3d9e8"/><text x="161" y="133" text-anchor="middle" fill="#253044">Pie Chart</text>
    <rect x="210" y="112" width="92" height="32" rx="8" fill="#f3f6fc" stroke="#d3d9e8"/><text x="256" y="133" text-anchor="middle" fill="#253044">Sequence</text>
    <rect x="310" y="112" width="88" height="32" rx="8" fill="#f3f6fc" stroke="#d3d9e8"/><text x="354" y="133" text-anchor="middle" fill="#253044">Mind Map</text>
  </g>
  <rect x="24" y="162" width="430" height="294" rx="10" fill="#f9fafc" stroke="#d3d9e8"/>
  <text x="44" y="190" font-family="ui-monospace,Menlo,monospace" font-size="15" fill="#111827">graph TD</text>
  <text x="64" y="216" font-family="ui-monospace,Menlo,monospace" font-size="15" fill="#111827">A[Start] --&gt; B{Decision}</text>
  <text x="64" y="242" font-family="ui-monospace,Menlo,monospace" font-size="15" fill="#111827">B --&gt;|Yes| C[Continue]</text>
  <text x="64" y="268" font-family="ui-monospace,Menlo,monospace" font-size="15" fill="#111827">B --&gt;|No| D[Stop]</text>
  <rect x="470" y="162" width="456" height="294" rx="10" fill="#fff" stroke="#d3d9e8"/>
  <g stroke="#334155" stroke-width="2" fill="none">
    <path d="M698 224v48"/><path d="M672 326l-70 64"/><path d="M724 326l70 64"/>
  </g>
  <rect x="648" y="182" width="100" height="56" fill="#eee9ff" stroke="#a78bfa"/>
  <polygon points="698,272 760,328 698,384 636,328" fill="#f1edff" stroke="#a78bfa"/>
  <rect x="552" y="408" width="132" height="56" fill="#eee9ff" stroke="#a78bfa"/>
  <rect x="766" y="408" width="100" height="56" fill="#eee9ff" stroke="#a78bfa"/>
  <g font-family="Inter,Arial,sans-serif" font-size="16" text-anchor="middle">
    <text x="698" y="216" fill="#1e3a8a">Start</text><text x="698" y="334" fill="#9f1239">Decision</text><text x="618" y="442" fill="#065f46">Continue</text><text x="816" y="442" fill="#991b1b">Stop</text>
  </g>
</svg>
